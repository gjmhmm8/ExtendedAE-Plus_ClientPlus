name: Build CI

on:
  push:
    branches: [ "1.21.1kotlin" ]
  pull_request:
    branches: [ "1.21.1kotlin" ]

jobs:
  build:
    if: "!contains(github.event.head_commit.message, 'skip-ci')"

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set Build Type
        id: set_env
        run: |
          if [[ "${{ github.event.head_commit.message }}" == *"build-release"* ]]; then
            echo "BUILD_TYPE=release" >> $GITHUB_ENV
          else
            echo "BUILD_TYPE=snapshot" >> $GITHUB_ENV
          fi

      - name: Read Properties
        id: 'properties'
        uses: christian-draeger/read-properties@1.1.1
        with:
          path: gradle.properties
          properties: 'mod_id mod_name'

      - name: Setup Java 21
        uses: actions/setup-java@v3.6.0
        with:
          distribution: zulu
          java-version: 21

      - name: Make Gradle Executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.3.1

      - name: Build with Gradle
        run: ./gradlew build

      - name: Get Version
        id: version
        run: |
          MESSAGE=$(ls build/libs/* | awk -F '${{ steps.properties.outputs.mod_name }}-|.jar' '{print $2}')
          echo "version=$MESSAGE" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ steps.properties.outputs.mod_name }} ${{ steps.version.outputs.version }}"
          path: build/libs/ExtendedAE Plus Client-${{ steps.version.outputs.version }}.jar